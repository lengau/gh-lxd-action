name: Run Command in LXD Container
description: Run a shell script inside a running LXD container.

inputs:
  container:
    description: >
      Name of the container to run the command in. If omitted, auto-detected
      from the single running container. Required when multiple containers are
      present on the runner.
  user:
    description: >
      Username to run the command as. If omitted, runs as root.
      Should match the user created in the launch action.
  run:
    description: The command(s) to run. Works the same as the `run` key on a GitHub Actions step.
    required: true
  shell:
    description: >
      Shell to use to run the script, with {0} replaced by the script path inside
      the container. Works the same as the `shell` key on a GitHub Actions step.
    default: bash -e {0}
  working-directory:
    description: Working directory inside the container.
    default: /root/project
  env:
    description: >
      Additional environment variables to pass into the container, as a
      newline-separated list of KEY=VALUE pairs. Works the same as the `env`
      key on a GitHub Actions step.

runs:
  using: composite
  steps:
    - name: Run command
      shell: bash
      env:
        CONTAINER: ${{ inputs.container }}
        CONTAINER_USER: ${{ inputs.user }}
        WORKING_DIR: ${{ inputs.working-directory }}
        GH_LXD_SHELL: ${{ inputs.shell }}
        GH_LXD_RUN: ${{ inputs.run }}
        GH_LXD_ENV: ${{ inputs.env }}
      run: |
        if [ -z "$CONTAINER" ]; then
          CONTAINER="${GH_LXD_CONTAINER:-}"
        fi
        if [ -z "$CONTAINER" ]; then
          CONTAINERS=$(lxc list --format csv -c n)
          COUNT=$(printf '%s\n' "$CONTAINERS" | grep -c .)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No LXD containers found." >&2
            exit 1
          elif [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple LXD containers found; specify the 'container' input." >&2
            exit 1
          fi
          CONTAINER="$CONTAINERS"
        fi
        if [ -n "$CONTAINER_USER" ]; then
          SCRIPT_DIR="/home/$CONTAINER_USER/gh-lxd-action"
        else
          SCRIPT_DIR="/root/gh-lxd-action"
        fi
        SCRIPT=$(mktemp)
        printf '%s\n' "$GH_LXD_RUN" > "$SCRIPT"
        lxc file push -p "$SCRIPT" "${CONTAINER}${SCRIPT_DIR}/exec.sh"
        rm -f "$SCRIPT"
        SHELL_CMD="${GH_LXD_SHELL//\{0\}/${SCRIPT_DIR}\/exec.sh}"
        # Build --env flags: always forward CI and GITHUB_* vars, plus user-specified vars
        ENV_ARGS=()
        for var in CI GITHUB_ACTIONS GITHUB_WORKSPACE GITHUB_SHA GITHUB_REF \
                   GITHUB_REPOSITORY GITHUB_RUN_ID GITHUB_RUN_NUMBER \
                   RUNNER_OS RUNNER_ARCH RUNNER_TEMP; do
          [ -n "${!var+x}" ] && ENV_ARGS+=(--env "${var}=${!var}")
        done
        while IFS= read -r line; do
          [ -n "$line" ] && ENV_ARGS+=(--env "$line")
        done <<< "$GH_LXD_ENV"
        if [ -n "$CONTAINER_USER" ]; then
          # UID matches the runner's UID, set at container creation time
          lxc exec "${ENV_ARGS[@]}" --user "$(id -u)" "$CONTAINER" -- sh -c "cd '$WORKING_DIR' && $SHELL_CMD"
        else
          lxc exec "${ENV_ARGS[@]}" "$CONTAINER" -- sh -c "cd '$WORKING_DIR' && $SHELL_CMD"
        fi
