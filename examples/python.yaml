name: CI (Python)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          # Ubuntu LTS and supported interim releases
          - ubuntu/22.04
          - ubuntu/24.04
          - ubuntu/25.10
          - ubuntu/26.04
          # Debian stable and oldstable
          - debian/12
          - debian/13
          # Fedora (two most recent releases)
          - fedora/43
          - fedora/44
          # AlmaLinux
          - almalinux/8
          - almalinux/9
          - almalinux/10
          # Alpine Linux
          - alpine/3.21
          - alpine/3.22
          - alpine/3.23
          - alpine/3.24
          # CentOS Stream
          - centos/stream9
          - centos/stream10

    steps:
      - uses: actions/checkout@v4

      - name: Launch container
        uses: <owner>/gh-lxd-action/launch@v1
        with:
          image: ${{ matrix.distro }}

      - name: Set up Python environment
        uses: <owner>/gh-lxd-action/exec@v1
        with:
          run: |
            python3 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e ".[dev]"

      - name: Run tests
        uses: <owner>/gh-lxd-action/exec@v1
        with:
          run: .venv/bin/pytest

      - name: Stop container
        if: always()
        uses: <owner>/gh-lxd-action/stop@v1
